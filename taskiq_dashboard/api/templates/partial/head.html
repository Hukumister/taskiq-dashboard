<meta charset="utf-8" />
<link rel="stylesheet" href="{{ url_for('static', path='css/tailwind.css') }}" />
<style>
    [x-cloak] {
        display: none !important;
    }
</style>
<script defer src="{{ url_for('static', path='htmx.js') }}"></script>
<script defer src="{{ url_for('static', path='alpine.js') }}"></script>
<script>
    document.addEventListener('click', function (event) {
        const row = event.target.closest('tr[data-href]');
        if (!row) return;
        if (event.target.closest('a, input, button, label, select, textarea')) return;
        if (event.metaKey || event.ctrlKey) {
            window.open(row.dataset.href, '_blank');
        } else {
            window.location.href = row.dataset.href;
        }
    });
</script>
<script>
    (function () {
        const THEMES = {
            latte: 1,
            frappe: 1,
            macchiato: 1,
            mocha: 1,
            auto: 1,
        };
        try {
            const isAuto = localStorage.getItem("theme-auto") === "true";
            let theme = localStorage.getItem("theme");
            if (!theme || !THEMES[theme] || isAuto) {
                theme = matchMedia("(prefers-color-scheme: dark)").matches ? "mocha" : "latte";
            }
            document.documentElement.className = theme;
            document.documentElement.style.colorScheme = theme === "latte" ? "light" : "dark";
            document.documentElement.setAttribute("data-theme-ready", "true");
            window.__theme = theme;
        } catch (_) {}
    })();
</script>
<link rel="icon" href="{{ url_for('static', path='favicon/favicon.svg') }}" type="image/svg+xml" />
<link rel="icon" href="{{ url_for('static', path='favicon/favicon.ico') }}" type="image/x-icon" />
<link rel="apple-touch-icon" href="{{ url_for('static', path='favicon/favicon.png') }}" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
